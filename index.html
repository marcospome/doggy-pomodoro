<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/dachshund.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doggy Pomodoro</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>

<body
  class="min-h-screen font-sans flex flex-col items-center justify-center p-4 transition-colors duration-500 ease-in-out"
  id="body-bg" data-theme="pastel">

  <div
    class="glass relative p-8 md:p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center w-full max-w-md transition-all duration-300">

    <!-- Settings Button (Top Right) -->
    <button id="btn-settings"
      class="absolute top-6 right-6 p-2 rounded-full glass-button hover:text-slate-900 focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
        </path>
      </svg>
    </button>

    <!-- Avatar -->
    <div class="mb-6 relative flex justify-center w-full">
      <!-- Pulse ring behind avatar when active -->
      <div id="avatar-pulse"
        class="absolute inset-0 bg-white/40 rounded-full scale-100 opacity-0 transition-all duration-1000 w-32 h-32 mx-auto">
      </div>
      <img src="/dachshund.png" alt="Dachshund Pomodoro Centerpiece"
        class="w-32 h-32 rounded-full object-cover border-4 border-white shadow-lg relative z-10 mx-auto"
        id="doggy-avatar" />
    </div>

    <!-- Mode Selector -->
    <div class="glass flex flex-wrap justify-center gap-2 mb-8 p-1.5 rounded-full shadow-sm w-full max-w-sm">
      <button id="mode-pomodoro"
        class="mode-btn flex-1 py-2 px-4 rounded-full text-sm sm:text-base font-medium transition-all duration-300 active-mode"
        data-mode="pomodoro">Pomodoro</button>
      <button id="mode-short"
        class="mode-btn flex-1 py-2 px-4 rounded-full text-sm sm:text-base font-medium transition-all duration-300"
        data-mode="short">Short Break</button>
      <button id="mode-long"
        class="mode-btn flex-1 py-2 px-4 rounded-full text-sm sm:text-base font-medium transition-all duration-300"
        data-mode="long">Long Break</button>
    </div>

    <!-- Timer Display -->
    <div
      class="timer-text text-[5.5rem] sm:text-[7rem] leading-none font-black tracking-tighter mb-8 tabular-nums drop-shadow-sm transition-colors duration-500"
      id="timer-display">
      25:00
    </div>

    <!-- Controls -->
    <div class="flex gap-4 w-full">
      <button id="btn-start"
        class="start-btn flex-1 py-4 px-8 rounded-2xl font-bold text-xl shadow-[0_8px_16px_rgba(0,0,0,0.06)] hover:shadow-[0_12px_24px_rgba(0,0,0,0.1)] hover:-translate-y-1 active:translate-y-0 active:shadow-sm transition-all duration-200 uppercase tracking-widest border-2 border-transparent">
        Start
      </button>
    </div>

    <!-- Mini Reset Text Botton -->
    <button id="btn-reset"
      class="mt-6 text-sm font-medium opacity-60 hover:opacity-100 transition-opacity flex items-center gap-1 uppercase tracking-wider">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg>
      Reset Time
    </button>

    <!-- Music Player (YouTube Lofi) -->
    <div class="mt-8 w-full flex flex-col items-center opacity-90 transition-opacity hover:opacity-100">
      <div id="player-youtube" class="w-full transition-all duration-300">
        <div class="relative w-full overflow-hidden rounded-[16px]" style="padding-top: 56.25%; max-height: 152px;">
          <iframe class="absolute top-0 left-0 w-full h-full rounded-[16px]"
            src="https://www.youtube-nocookie.com/embed/jfKfPfyJRdk?autoplay=0&controls=1&mute=0"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="mt-8 text-sm font-medium opacity-70 flex items-center gap-1.5 transition-opacity hover:opacity-100">
    by Marquitos ☕🤍
  </div>

  <!-- Settings Modal Backdrop -->
  <div id="modal-backdrop"
    class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4">
    <!-- Settings Modal Content -->
    <div id="settings-modal"
      class="glass p-8 rounded-[2rem] shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
      <div class="flex justify-between items-center mb-6">
        <h2 class="settings-heading text-2xl font-bold">Settings</h2>
        <button id="btn-close-settings" class="settings-label hover:text-slate-800 transition-colors p-2 -mr-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
        <!-- Theme Selection -->
        <div>
          <label class="block text-sm font-medium settings-label mb-1">Color Preset Theme</label>
          <select id="select-theme"
            class="w-full settings-input rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all">
            <option value="pastel">Light / Pastel</option>
            <option value="dark">Dark / Vibrant</option>
            <option value="matte">Matte / Earthy</option>
            <option value="contrast">High Contrast</option>
          </select>
          <p class="text-xs text-slate-400 mt-1">Select a preset to auto-fill the colors below.</p>
        </div>

        <!-- Custom Colors -->
        <div class="pt-2 border-t border-[var(--glass-border)]">
          <h3 class="text-sm font-bold settings-heading mb-3">Custom Colors (Active Mode)</h3>

          <div class="flex items-center justify-between mb-3">
            <label class="text-sm font-medium settings-label">Background Color</label>
            <div
              class="relative w-10 h-10 rounded-lg overflow-hidden border border-[var(--glass-border)] shadow-sm cursor-pointer">
              <input type="color" id="input-color-bg" class="absolute w-20 h-20 -top-5 -left-5 cursor-pointer">
            </div>
          </div>

          <div class="flex items-center justify-between mb-3">
            <label class="text-sm font-medium settings-label">Card (Glass) Color</label>
            <div
              class="relative w-10 h-10 rounded-lg overflow-hidden border border-[var(--glass-border)] shadow-sm cursor-pointer">
              <input type="color" id="input-color-glass" class="absolute w-20 h-20 -top-5 -left-5 cursor-pointer">
            </div>
          </div>

          <div class="flex items-center justify-between mb-3">
            <label class="text-sm font-medium settings-label">Accent (Timer / Buttons)</label>
            <div
              class="relative w-10 h-10 rounded-lg overflow-hidden border border-[var(--glass-border)] shadow-sm cursor-pointer">
              <input type="color" id="input-color-accent" class="absolute w-20 h-20 -top-5 -left-5 cursor-pointer">
            </div>
          </div>
          <p class="text-xs text-slate-400 mt-1 mb-2">These colors are saved for the currently active mode (<span
              id="settings-mode-label" class="capitalize font-semibold"></span>).</p>
        </div>

        <!-- Timer Settings -->
        <div class="pt-2 border-t border-[var(--glass-border)]">
          <label class="block text-sm font-medium settings-label mb-1">Pomodoro (minutes)</label>
          <input type="number" id="input-pomodoro"
            class="w-full settings-input rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all mb-3"
            value="25" min="1" max="90">

          <label class="block text-sm font-medium settings-label mb-1">Short Break (minutes)</label>
          <input type="number" id="input-short"
            class="w-full settings-input rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all mb-3"
            value="5" min="1" max="30">

          <label class="block text-sm font-medium settings-label mb-1">Long Break (minutes)</label>
          <input type="number" id="input-long"
            class="w-full settings-input rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
            value="15" min="1" max="60">
        </div>
      </div>

      <button id="btn-save-settings"
        class="w-full mt-6 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3.5 px-6 rounded-xl shadow-md transform hover:-translate-y-0.5 transition-all">
        Save Settings
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
